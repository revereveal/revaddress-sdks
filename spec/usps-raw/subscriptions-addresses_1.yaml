openapi: 3.0.1
info:
  title: Subscriptions - Addresses 
  description: |
    Contact Us: [USPS API Support](https://emailus.usps.com/s/usps-APIs) | [Terms of Service](https://about.usps.com/termsofuse.htm)
       
    Create a subscription to address updates by CRID. Manage all address update subscriptions, in one place, by providing your server URL to receive events. Parse the address update event data received on the server URL, or call back to the receiving api for the full detailed set of events.
    
    Security for the API traffic is provided through IP whitelisting and HMAC. Both of these options are optional. For IP whitelisting, configure your endpoint to only receive traffic from USPS IP addresses. For HMAC, provide a secret in the subscription request that we use to hash the payload using the SHA-256 algorithm. The hash is available as part of the notification subscribers receive. 

    Subscriptions will be maintained as long as the retention date is in the future. After the retention date has passed, USPS may delete your subscription. A warning email will be sent to admin email 7 days prior to the end of subscription retention date and a confirmation email will be sent once the subscription has been deleted.  After the subscription is deleted you will need to create a new subscription to receive future events. 

    Customers are permitted to use a maximum of 10 unique Listener URLs for all their subscriptions, and this limit is enforced per Home CRID. For example, if a customer has two CRIDs, they may use up to 20 unique Listener URLs. Once the unique URL limit is reached, webhook subscription requests will be rejected, and an alert notification will be sent each time a subscription is rejected due to exceeding the URL limit. 
  contact:
    name: USPS API Support
  version: 3.0.0
servers:
  - url: https://apis.usps.com/subscriptions-address/
    description: Production Environment Endpoint
  - url: https://apis-tem.usps.com/subscriptions-address/
    description: Testing Environment Endpoint
tags:
  - name: Resources
    description: Subscription management resources.
  - name: Listener URL Specification
    description: Notification listener endpoint contract.
security:
  - OAuth:
      - subscriptions-addresses
paths:
  /subscriptions:
    post:
      tags:
        - Resources
      summary: Create a Subscription.
      description: Create a Subscription to be alerted for Address updates.
      operationId: post-subscriptions-adress
      requestBody:
        description: The input parameters corresponding to the supported grant types.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressSubscription'
            examples:
              Address-Subscription:
                $ref: '#/components/examples/Subscription'
          application/xml:
            schema:
              $ref: '#/components/schemas/AddressSubscription'
        required: true
      responses:
        "201":
          description: Subscription Confirmation.
          headers:
            Location:
              description: The URL to the newly created resource.
              style: simple
              explode: false
              schema:
                $ref: '#/components/schemas/URIString'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressSubscription'
            application/xml:
              schema:
                $ref: '#/components/schemas/AddressSubscription'
        "400":
          description: Invalid request information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "401":
          description: Unauthorized.
          headers:
            WWW-Authenticate:
              $ref: '#/components/headers/WWWAuthenticate'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "403":
          description: Access Denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "429":
          description: Too Many Requests. Too many requests have been received from client in a short amount of time.
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "503":
          description: Service Unavailable.
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        default:
          description: Other unanticipated errors that may occur.
      security:
        - OAuth:
            - subscriptions-address
  /subscriptions/{subscriptionId}:
    get:
      tags:
        - Resources
      summary: Get a unique subscription by using its subscriptionId.
      description: Get a unique subscription by using its subscriptionId.
      operationId: get-subscriptions-address-id
      parameters:
        - $ref: '#/components/parameters/subscriptionId'
      responses:
        "200":
          description: This will return the unique subscription.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressSubscription'
            application/xml:
              schema:
                $ref: '#/components/schemas/AddressSubscription'
        "400":
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "401":
          description: Unauthorized.
          headers:
            WWW-Authenticate:
              $ref: '#/components/headers/WWWAuthenticate'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "403":
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "429":
          description: Too Many Requests. Too many requests have been received from client in a short amount of time.
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "503":
          description: Service Unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        default:
          description: Other unanticipated errors that may occur.
      security:
        - OAuth:
            - subscriptions-address
    delete:
      tags:
        - Resources
      summary: Delete a Subscription by ID.
      description: Use this endpoint to delete a Subscription by its unique identifier.
      operationId: delete-subscriptions-addresses-id
      parameters:
        - $ref: '#/components/parameters/subscriptionId'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        "204":
          description: Subscription Deleted (no content)
        "400":
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "401":
          description: Unauthorized.
          headers:
            WWW-Authenticate:
              $ref: '#/components/headers/WWWAuthenticate'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "403":
          description: Access Denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "429":
          description: Too Many Requests. Too many requests have been received from client in a short amout of time.
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "503":
          description: Service Unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        default:
          description: Other unanticipated errors that may occur.
      security:
        - OAuth:
            - subscriptions-address
  /notifications:
    post:
      tags:
        - Listener URL Specification
      summary: Notification event which the API caller should implement.
      description: |
        Notification event API callers implement to receive change of address data. This is the url in which data will be pushed to. Each subscriptions notification response contains a field named `payload` which is a JavaScript object that has been converted into a JSON formatted string. The text should be converted into a JavaScript object via JSON.parse(). The JavaScript object notation (JSON) schemas are provided in the API specification.  The Change of Address Subscription Event example should be parsed with the Addres Detail schema example should be parsed with the Address Detail schema.
      operationId: post-notifications-address
      parameters:
        - $ref: '#/components/parameters/XHMAC'
        - $ref: '#/components/parameters/HMACHeaderDeprecated'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressNotificationEvent'
            examples:
              'Address Notification Event':
                $ref: '#/components/examples/AddressEvent'
        required: true
      responses:
        "200":
          description: Success
          headers:
            Content-Type:
              $ref: '#/components/headers/ContentType'
        "400":
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
            examples: {}
